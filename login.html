<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

       <script src="https://kit.fontawesome.com/9163b2bedf.js" crossorigin="anonymous"></script>

<header>
    <nav>
        <ul>
            <li><a href="index.html"><i class="fas fa-home"></i>Accueil</a></li>
            <li><a href="login.html"><i class="fas fa-sign-in-alt"></i>Connexion</a></li>
            <li><a href="contact.html"><i class="fas fa-envelope"></i>Contact</a></li>
        </ul>
    </nav>
</header>
<body>

    <h1>Connexion</h1>
    <form action="accueil.html" method="post">
        <label for="username"> <i class="fa-solid fa-envelope"></i>Email :</label>
        <input type="email" id="username" name="username" required>
        <br>
        <label for="password"> <i class="fa-solid fa-lock"></i>Mot de passe :</label>
        <input type="password" id="password" name="password" required>
        <br>
        <button type="submit">Se connecter</button>
    </form>
    <section>
     <h2>Pas encore inscrit ?</h2>
     <p>Rejoignez notre communauté de lecteurs passionnés en créant votre compte dès aujourd'hui !</p>
    <button><a href="inscrition.html">S'inscrire</a>
    </button>
    <footer>
        <p>&copy; 2026 E-Livre. Tous droits réservés.</p>
    </footer>
